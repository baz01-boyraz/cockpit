name: Release cockpiT

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  macos:
    name: macOS release
    runs-on: macos-latest
    steps:
      - name: Verify release tag
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" != "tag" || "${GITHUB_REF_NAME}" != v* ]]; then
            echo "::error::Release publishing must run from a v* tag. Select a release tag for workflow_dispatch."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python for native modules
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure node-gyp Python
        run: |
          PYTHON_PATH="$(python -c 'import sys; print(sys.executable)')"
          echo "PYTHON=${PYTHON_PATH}" >> "$GITHUB_ENV"
          echo "npm_config_python=${PYTHON_PATH}" >> "$GITHUB_ENV"

      - name: Configure macOS code signing
        env:
          MAC_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
          MAC_SELFSIGN_P12_BASE64: ${{ secrets.MAC_SELFSIGN_P12_BASE64 }}
          MAC_SELFSIGN_P12_PASSWORD: ${{ secrets.MAC_SELFSIGN_P12_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -n "${MAC_CERTIFICATE_BASE64:-}" ]]; then
            # Path A: real Apple Developer ID cert -> sign + (optionally) notarize.
            echo "Signing with Apple Developer ID certificate."
            echo "CSC_LINK=${MAC_CERTIFICATE_BASE64}" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=${MAC_CERTIFICATE_PASSWORD}" >> "$GITHUB_ENV"
            # Hardened Runtime only makes sense with a real Apple identity; the
            # self-signed path (Path B) keeps it off so its fragile signing flow
            # stays untouched. Entitlements live in resources/entitlements.mac.plist.
            echo "COCKPIT_HARDENED_RUNTIME=true" >> "$GITHUB_ENV"
            if [[ -n "${APPLE_ID_SECRET:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD_SECRET:-}" && -n "${APPLE_TEAM_ID_SECRET:-}" ]]; then
              echo "APPLE_ID=${APPLE_ID_SECRET}" >> "$GITHUB_ENV"
              echo "APPLE_APP_SPECIFIC_PASSWORD=${APPLE_APP_SPECIFIC_PASSWORD_SECRET}" >> "$GITHUB_ENV"
              echo "APPLE_TEAM_ID=${APPLE_TEAM_ID_SECRET}" >> "$GITHUB_ENV"
            else
              echo "Apple notarization credentials incomplete; notarization will be skipped."
            fi
          elif [[ -n "${MAC_SELFSIGN_P12_BASE64:-}" ]]; then
            # Path B: free self-signed cert. Gives every release the SAME stable
            # designated requirement so electron-updater / Squirrel.Mac accept
            # in-app updates across versions. The cert is NOT Apple-trusted, so the
            # FIRST install on a user's Mac still needs a one-time quarantine strip;
            # every later version then updates silently in-app.
            #
            # The signing identity's common name (CSC_NAME) MUST match the cert's CN
            # exactly — electron-builder filters discovered identities by this name,
            # and a mismatch makes it silently fall back to an ad-hoc signature.
            SIGN_IDENTITY="cockpiT Self Signed"
            echo "Signing with self-signed certificate (\"$SIGN_IDENTITY\")."
            KEYCHAIN="$RUNNER_TEMP/cockpit-signing.keychain-db"
            KEYCHAIN_PW="$(openssl rand -hex 20)"
            CERT_P12="$RUNNER_TEMP/cockpit-selfsign.p12"
            CERT_PEM="$RUNNER_TEMP/cockpit-selfsign.pem"
            printf '%s' "${MAC_SELFSIGN_P12_BASE64}" | base64 --decode > "$CERT_P12"
            openssl pkcs12 -in "$CERT_P12" -clcerts -nokeys -out "$CERT_PEM" \
              -passin pass:"${MAC_SELFSIGN_P12_PASSWORD}" -legacy 2>/dev/null \
              || openssl pkcs12 -in "$CERT_P12" -clcerts -nokeys -out "$CERT_PEM" \
                 -passin pass:"${MAC_SELFSIGN_P12_PASSWORD}"
            security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
            security set-keychain-settings -lut 21600 "$KEYCHAIN"
            security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
            security import "$CERT_P12" -k "$KEYCHAIN" -P "${MAC_SELFSIGN_P12_PASSWORD}" \
              -T /usr/bin/codesign -T /usr/bin/productbuild -A
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
            # Anchor the self-signed cert as a trusted root for ALL policies (no `-p`).
            # electron-builder also runs `security find-identity -v` under the basic
            # policy, so trusting code-signing only leaves the identity CSSMERR_TP_NOT_TRUSTED.
            sudo security add-trusted-cert -d -r trustRoot -k /Library/Keychains/System.keychain "$CERT_PEM"
            # Put our keychain first in the search list so codesign resolves the identity by name.
            EXISTING="$(security list-keychains -d user | sed -e 's/[\" ]//g' | tr '\n' ' ')"
            security list-keychains -d user -s "$KEYCHAIN" $EXISTING
            security default-keychain -d user -s "$KEYCHAIN"
            # Hard gate: the identity MUST resolve as valid. Otherwise electron-builder
            # would quietly fall back to ad-hoc and ship a "damaged"-looking unsigned app.
            if ! security find-identity -v -p codesigning "$KEYCHAIN" | grep -qF "$SIGN_IDENTITY"; then
              echo "::error::Self-signed identity \"$SIGN_IDENTITY\" not valid in keychain; aborting."
              security find-identity -v -p codesigning "$KEYCHAIN" || true
              exit 1
            fi
            echo "Resolved signing identity:"
            security find-identity -v -p codesigning "$KEYCHAIN"
            {
              echo "CSC_KEYCHAIN=${KEYCHAIN}"
              echo "CSC_NAME=${SIGN_IDENTITY}"
              echo "CSC_IDENTITY_AUTO_DISCOVERY=true"
              echo "COCKPIT_EXPECT_IDENTITY=${SIGN_IDENTITY}"
            } >> "$GITHUB_ENV"
          else
            echo "No signing certificate configured; building unsigned (ad-hoc)."
          fi

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Clear any partial release for this tag
        run: gh release delete "$GITHUB_REF_NAME" --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, sign, notarize, and publish
        run: |
          if [[ "${COCKPIT_HARDENED_RUNTIME:-}" == "true" ]]; then
            npm run package:publish -- -c.mac.hardenedRuntime=true
          else
            npm run package:publish
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
