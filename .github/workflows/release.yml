name: Release Baz Cockpit

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos:
    name: macOS release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python for native modules
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure node-gyp Python
        run: |
          PYTHON_PATH="$(python -c 'import sys; print(sys.executable)')"
          echo "PYTHON=${PYTHON_PATH}" >> "$GITHUB_ENV"
          echo "npm_config_python=${PYTHON_PATH}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build, sign, notarize, and publish
        run: npm run package:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
