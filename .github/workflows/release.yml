name: Release Baz Cockpit

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  macos:
    name: macOS release
    runs-on: macos-latest
    steps:
      - name: Verify release tag
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" != "tag" || "${GITHUB_REF_NAME}" != v* ]]; then
            echo "::error::Release publishing must run from a v* tag. Select a release tag for workflow_dispatch."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python for native modules
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure node-gyp Python
        run: |
          PYTHON_PATH="$(python -c 'import sys; print(sys.executable)')"
          echo "PYTHON=${PYTHON_PATH}" >> "$GITHUB_ENV"
          echo "npm_config_python=${PYTHON_PATH}" >> "$GITHUB_ENV"

      - name: Configure macOS code signing
        env:
          MAC_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
          MAC_SELFSIGN_P12_BASE64: ${{ secrets.MAC_SELFSIGN_P12_BASE64 }}
          MAC_SELFSIGN_P12_PASSWORD: ${{ secrets.MAC_SELFSIGN_P12_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -n "${MAC_CERTIFICATE_BASE64:-}" ]]; then
            # Path A: real Apple Developer ID cert -> sign + (optionally) notarize.
            echo "Signing with Apple Developer ID certificate."
            echo "CSC_LINK=${MAC_CERTIFICATE_BASE64}" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=${MAC_CERTIFICATE_PASSWORD}" >> "$GITHUB_ENV"
            if [[ -n "${APPLE_ID_SECRET:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD_SECRET:-}" && -n "${APPLE_TEAM_ID_SECRET:-}" ]]; then
              echo "APPLE_ID=${APPLE_ID_SECRET}" >> "$GITHUB_ENV"
              echo "APPLE_APP_SPECIFIC_PASSWORD=${APPLE_APP_SPECIFIC_PASSWORD_SECRET}" >> "$GITHUB_ENV"
              echo "APPLE_TEAM_ID=${APPLE_TEAM_ID_SECRET}" >> "$GITHUB_ENV"
            else
              echo "Apple notarization credentials incomplete; notarization will be skipped."
            fi
          elif [[ -n "${MAC_SELFSIGN_P12_BASE64:-}" ]]; then
            # Path B: free self-signed cert. Gives every release the SAME stable
            # designated requirement (certificate root hash) so electron-updater /
            # Squirrel.Mac accepts in-app updates across versions. Not Apple-trusted,
            # so the FIRST install still needs a one-time quarantine strip.
            echo "Signing with self-signed certificate (free, stable identity)."
            KEYCHAIN="$RUNNER_TEMP/baz-signing.keychain-db"
            KEYCHAIN_PW="$(openssl rand -hex 20)"
            CERT_P12="$RUNNER_TEMP/baz-selfsign.p12"
            CERT_PEM="$RUNNER_TEMP/baz-selfsign.pem"
            printf '%s' "${MAC_SELFSIGN_P12_BASE64}" | base64 --decode > "$CERT_P12"
            openssl pkcs12 -in "$CERT_P12" -clcerts -nokeys -out "$CERT_PEM" \
              -passin pass:"${MAC_SELFSIGN_P12_PASSWORD}" -legacy 2>/dev/null \
              || openssl pkcs12 -in "$CERT_P12" -clcerts -nokeys -out "$CERT_PEM" \
                 -passin pass:"${MAC_SELFSIGN_P12_PASSWORD}"
            security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
            security set-keychain-settings -lut 21600 "$KEYCHAIN"
            security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
            security import "$CERT_P12" -k "$KEYCHAIN" -P "${MAC_SELFSIGN_P12_PASSWORD}" -T /usr/bin/codesign -A
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
            # Trust the self-signed cert for code signing so it counts as a valid identity.
            sudo security add-trusted-cert -d -r trustRoot -p codeSign -k /Library/Keychains/System.keychain "$CERT_PEM"
            # Put our keychain first in the search list so codesign resolves the identity by name.
            EXISTING="$(security list-keychains -d user | sed -e 's/[\" ]//g' | tr '\n' ' ')"
            security list-keychains -d user -s "$KEYCHAIN" $EXISTING
            security default-keychain -d user -s "$KEYCHAIN"
            security find-identity -v -p codesigning "$KEYCHAIN"
            {
              echo "CSC_KEYCHAIN=${KEYCHAIN}"
              echo "CSC_NAME=Baz Cockpit Self Signed"
              echo "CSC_IDENTITY_AUTO_DISCOVERY=true"
            } >> "$GITHUB_ENV"
          else
            echo "No signing certificate configured; building unsigned (ad-hoc)."
          fi

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Clear any partial release for this tag
        run: gh release delete "$GITHUB_REF_NAME" --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, sign, notarize, and publish
        run: npm run package:publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
