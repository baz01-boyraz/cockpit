      <feDropShadow dx="0" dy="0" stdDeviation="34" flood-color="#e0703a" flood-opacity="0.34"/>
    </filter>
    <clipPath id="roundTile">
      <rect x="98" y="98" width="828" height="828" rx="190"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" fill="none"/>
  <g filter="url(#tileShadow)">
    <rect x="98" y="98" width="828" height="828" rx="190" fill="url(#tile)"/>
    <rect x="113" y="113" width="798" height="798" rx="175" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="12"/>
    <rect x="122" y="122" width="780" height="780" rx="166" fill="none" stroke="#e0703a" stroke-opacity="0.16" stroke-width="5"/>
  </g>
  <g clip-path="url(#roundTile)">
    <ellipse cx="315" cy="204" rx="360" ry="245" fill="#ffb254" opacity="0.12"/>
    <ellipse cx="830" cy="884" rx="360" ry="265" fill="#62bedd" opacity="0.08"/>
  </g>

  <g transform="translate(0 4)" filter="url(#markShadow)">
    <path d="M728 204a414 414 0 0 0-238-30 413 413 0 0 0-252 663"
      fill="none" stroke="url(#rim)" stroke-width="88" stroke-linecap="round" stroke-dasharray="356 96 178 130"/>
    <path d="M238 837a413 413 0 0 0 456 78"
      fill="none" stroke="url(#ember)" stroke-width="88" stroke-linecap="round" stroke-dasharray="212 62 128"/>
    <path d="M276 765a325 325 0 0 1 446-413"
      fill="none" stroke="url(#glass)" stroke-width="22" stroke-linecap="round" stroke-dasharray="148 112" opacity="0.88"/>

    <path d="M897 164 574 594 241 804 452 470Z" fill="#08080d" opacity="0.42"/>
    <path d="M897 164 452 470 513 532 574 594Z" fill="url(#hot)"/>
    <path d="M897 164 574 594 513 532Z" fill="url(#ember)"/>
    <path d="M513 532 574 594 241 804Z" fill="#6b2f14" opacity="0.9"/>
    <path d="M513 532 241 804 452 470Z" fill="#08080d" opacity="0.34"/>
    <circle cx="513" cy="532" r="118" fill="url(#core)" opacity="0.42"/>
    <circle cx="513" cy="532" r="50" fill="#15151d"/>
    <circle cx="513" cy="532" r="24" fill="#ffe2cb" opacity="0.94"/>
